# Bật Daemon để tái sử dụng giữa các lần chạy
org.gradle.daemon=true

# Tăng bộ nhớ cho Gradle Daemon (mặc định 512MB thường không đủ)
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError

# Build song song nếu có nhiều project
org.gradle.parallel=true

# Bật caching để không phải build lại những gì không đổi
org.gradle.caching=true

# Lazy configuration (Spring Boot 3+ hỗ trợ)
org.gradle.configuration-cache=false
