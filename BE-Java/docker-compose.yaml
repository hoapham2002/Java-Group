services:
  postgres_db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=studyHubAI
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=123456
    ports:
      - "5431:5432"
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    depends_on:
      - postgres_db
    ports:
      - "85:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=user@localhost.com
      - PGADMIN_DEFAULT_PASSWORD=123456
    restart: unless-stopped
